name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_SHARED_SECRET: ci-shared-secret-32-characters-long
      JWT_SECRET: ci-jwt-secret-value-32-characters
      CONVERSATION_DATABASE_PATH: /tmp/call-hermes-pytest.sqlite3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg shellcheck
      - run: python -m venv server/.venv && server/.venv/bin/pip install --upgrade pip && server/.venv/bin/pip install -e 'server[dev]' pip-audit bandit
      - run: server/.venv/bin/ruff check server/app server/tests scripts
      - run: server/.venv/bin/ruff format --check server/app server/tests scripts
      - run: server/.venv/bin/pytest -q server/tests
      - run: node scripts/test_frontend.mjs
      - run: node scripts/test_auth_frontend.mjs
      - run: shellcheck scripts/*.sh
      - run: server/.venv/bin/bandit -q -r server/app -x server/tests
      - run: server/.venv/bin/pip-audit --skip-editable

  browser-smoke:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.browser == 'firefox' }}
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    name: browser-smoke (${{ matrix.browser }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e server playwright
      - run: playwright install --with-deps ${{ matrix.browser }}
      - name: Start mock voice bridge
        env:
          APP_SHARED_SECRET: ci-shared-secret-32-characters-long
          JWT_SECRET: ci-jwt-secret-value-32-characters
          CONVERSATION_DATABASE_PATH: /tmp/call-hermes-ci.sqlite3
          USE_MOCK_ASR: "true"
          USE_MOCK_TTS: "true"
        run: |
          HOST_IP=$(hostname -I | awk '{print $1}')
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout /tmp/call-hermes-ci.key -out /tmp/call-hermes-ci.crt \
            -subj "/CN=${HOST_IP}" -addext "subjectAltName=IP:${HOST_IP}"
          echo "BASE_URL=https://${HOST_IP}:10005" >> "$GITHUB_ENV"
          PUBLIC_BASE_URL="https://${HOST_IP}:10005" \
            uvicorn app.main:app --app-dir server --host 0.0.0.0 --port 10005 \
              --ssl-keyfile /tmp/call-hermes-ci.key --ssl-certfile /tmp/call-hermes-ci.crt \
              > /tmp/call-hermes.log 2>&1 &
      - run: curl -k --retry 20 --retry-delay 1 --retry-connrefused https://127.0.0.1:10005/live
      - name: Run browser WebRTC smoke
        env:
          APP_SHARED_SECRET: ci-shared-secret-32-characters-long
          BROWSER: ${{ matrix.browser }}
        run: python scripts/e2e_browser_smoke.py
      - name: Show voice bridge log on failure
        if: failure()
        run: cat /tmp/call-hermes.log
